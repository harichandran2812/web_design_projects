<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/signstyle.css">
    <title>Sign UP</title>
</head>
<body>
    <div id="su_main">
          <div id="resfiled">
                 <form action="#">
                    <h4 id="Signtitle">Register SignUp</h4>
                    <div id="user_input">
                        <label for="fnane">First Name:</label>
                        <input type="text" name="fname" placeholder="Enter your first name" required>
                        <label for="lname">Last Name:</label>
                        <input type="text" name="lname" required placeholder="Enter your last name">
                        <label for="email">Email Id:</label>
                        <input type="email" name="emailId" required placeholder="Enter Your Email account">
                        <label for="pwd">Password:</label>
                        <input type="password" name="pwd" required placeholder="Enter your password" minlength="6">
                        <input type="submit">
                    </div>
                 </form>
          </div>
    </div>

</body>
</html>
